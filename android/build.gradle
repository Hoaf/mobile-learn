buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 21
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "25.1.8937393"
        kotlinVersion = "1.9.24"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.5.0")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

allprojects {
    configurations.all {
        resolutionStrategy.dependencySubstitution {
            substitute module('org.jetbrains.kotlin:kotlin-stdlib-jre8') using module('org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.24')
            substitute module('org.jetbrains.kotlin:kotlin-stdlib-jre7') using module('org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.24')
        }
    }
}

apply plugin: "com.facebook.react.rootproject"
